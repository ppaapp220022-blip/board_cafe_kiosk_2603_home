spring.application.name=board_cafe_kiosk_2603
#database
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/board_cafe_kiosk_2603
spring.datasource.username=admin
spring.datasource.password=0331
# logging
logging.level.org.springframework=info
logging.level.org.example.board_cafe_kiosk_2603=debug
logging.level.org.mybatis=debug
logging.level.java.sql=debug
# logging pattern
logging.pattern.console=%clr(%-5level){green} %clr(%logger{36}.%M\\(\\)){cyan}: %msg%n
# toss payments
toss.payments.secret-key=test_sk_YOUR_SECRET_KEY_HERE
toss.payments.confirm-url=https://api.tosspayments.com/v1/payments/confirm
# mybatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=org.example.board_cafe_kiosk_2603.domain.kiosk,org.example.board_cafe_kiosk_2603.domain.admin
# error detail
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always