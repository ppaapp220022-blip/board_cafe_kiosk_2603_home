<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
  <title>Macro Management</title>
  <th:block layout:fragment="head-extra">
    <style>
      .header-flex { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
      .page-title  { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
      .page-desc   { color: var(--text-gray); font-size: 15px; }

      .btn-add-macro {
        background: var(--primary-blue); color: white; border: none;
        padding: 12px 20px; border-radius: 8px; font-weight: 600;
        cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 15px;
      }

      /* 추가 폼 */
      #add-macro-form { display: none; margin-bottom: 30px; }
      .form-card { background: white; border-radius: 16px; padding: 30px; box-shadow: var(--card-shadow); border: 1px solid #f0f0f0; }
      .form-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; font-size: 14px; font-weight: 600; color: #666; margin-bottom: 8px; }
      .form-select  { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #333; font-size: 15px; font-weight: 500; background: #fff; cursor: pointer; }
      .form-textarea { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa; font-size: 15px; min-height: 100px; resize: none; outline: none; }
      .form-textarea:focus { border-color: var(--primary-blue); background: #fff; }
      .btn-row { display: flex; gap: 10px; }
      .btn-save   { background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; }
      .btn-cancel { background: #828282; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; }

      /* 매크로 카드 */
      .macro-card { background: white; border-radius: 16px; padding: 25px; box-shadow: var(--card-shadow); border: 1px solid #f0f0f0; margin-bottom: 25px; }
      .macro-group-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; font-size: 18px; font-weight: 700; }
      .icon-box   { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
      .bg-blue    { background: #e7f3ff; color: var(--primary-blue); }
      .bg-green   { background: #eafaf1; color: #2ecc71; }

      .message-item {
        background: #f1f3f5; padding: 18px 20px; border-radius: 10px;
        margin-bottom: 12px; font-size: 15px; color: #444;
        border: 1px solid transparent; transition: 0.2s;
        display: flex; justify-content: space-between; align-items: center;
      }
      .message-item:hover { border-color: #ddd; background: #ebedf0; }
      .message-item:last-child { margin-bottom: 0; }
      .btn-delete-msg { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0 5px; transition: 0.2s; }
      .btn-delete-msg:hover { color: var(--danger-red); }
    </style>
  </th:block>
</head>

<body>
<!--
  ※ Controller 작성 가이드 (MacroController.java)
  -------------------------------------------------
  @GetMapping("/macros")
  public String macros(Model model) {
      model.addAttribute("activePage", "macroSettings");
      model.addAttribute("isAdmin", true);
      // 카테고리별로 그룹핑해서 Map<String, List<MacroDto>> 로 전달하거나
      // 카테고리 목록과 전체 리스트를 별도 전달
      model.addAttribute("macroGroups", macroService.findAllGrouped()); // Map<String, List<MacroDto>>
      return "pages/macro";
  }

  @PostMapping("/macros")
  public String addMacro(@RequestParam String category,
                         @RequestParam String message) {
      macroService.save(category, message);
      return "redirect:/macros";
  }

  @PostMapping("/macros/{id}/delete")
  public String deleteMacro(@PathVariable Long id) {
      macroService.delete(id);
      return "redirect:/macros";
  }

  MacroDto 필드:
    - Long   id       : PK
    - String category : 카테고리 ("order" | "service" 등)
    - String message  : 메시지 내용
    - String iconClass: 아이콘 CSS 클래스 (bg-blue, bg-green 등)

  macroGroups 구조 예시 (Map):
    "Order Status"   → [MacroDto, MacroDto, ...]
    "Service Request"→ [MacroDto, ...]
-->
<th:block layout:fragment="content">
  <div class="header-flex">
    <div>
      <h1 class="page-title">Macro Management</h1>
      <p class="page-desc">Create and manage quick response messages</p>
    </div>
    <button class="btn-add-macro" onclick="toggleAddForm()">+ Add Macro</button>
  </div>

  <!-- 추가 폼 -->
  <section id="add-macro-form">
    <div class="form-card">
      <div class="form-title">Add New Macro</div>
      <form th:action="@{/macros}" method="post">
        <div class="form-group">
          <label>Category</label>
          <select name="category" class="form-select">
            <option value="order">Order Status</option>
            <option value="service">Service Request</option>
          </select>
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea name="message" class="form-textarea" placeholder="Enter macro message..."></textarea>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn-save">💾 Save</button>
          <button type="button" class="btn-cancel" onclick="toggleAddForm()">✕ Cancel</button>
        </div>
      </form>
    </div>
  </section>

  <!-- 매크로 그룹 목록 (macroGroups: Map<String, List<MacroDto>>) -->
  <th:block th:each="entry, stat : ${macroGroups}">
    <section class="macro-card">
      <div class="macro-group-header">
        <div class="icon-box" th:classappend="${stat.even} ? 'bg-blue' : 'bg-green'">💬</div>
        <span th:text="${entry.key}">카테고리명</span>
      </div>
      <div th:each="macro : ${entry.value}" class="message-item">
        <span th:text="${macro.message}">메시지 내용</span>
        <form th:action="@{/macros/{id}/delete(id=${macro.id})}" method="post" style="margin:0;">
          <button type="submit" class="btn-delete-msg" title="삭제">✕</button>
        </form>
      </div>
    </section>
  </th:block>
</th:block>

<th:block layout:fragment="scripts">
  <script>
    function toggleAddForm() {
      const form = document.getElementById('add-macro-form');
      form.style.display = (form.style.display === 'block') ? 'none' : 'block';
      if (form.style.display === 'block') form.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</th:block>
</body>
</html>
