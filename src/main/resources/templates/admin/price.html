<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
  <title>Price Adjustment</title>
  <th:block layout:fragment="head-extra">
    <style>
      .page-title { font-size: 28px; font-weight: 700; margin-bottom: 30px; }

      /* 섹션 카드 */
      .section-card {
        background: white; border-radius: 20px; padding: 30px;
        box-shadow: var(--card-shadow); border: 1px solid #f0f0f0; margin-bottom: 30px;
      }
      .section-header { font-size: 18px; font-weight: 700; margin-bottom: 25px; }

      /* 가격 조정 아이템 */
      .adjustment-item { border: 1px solid #f0f0f0; border-radius: 12px; padding: 20px; margin-bottom: 15px; position: relative; }
      .apply-date      { position: absolute; top: 20px; right: 20px; font-size: 12px; color: var(--text-gray); }
      .product-name    { font-weight: 700; font-size: 16px; margin-bottom: 10px; }
      .item-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        align-items: center;
      }
      .price-label { font-size: 12px; color: var(--text-gray); margin-bottom: 5px; }
      .current-val { font-size: 18px; font-weight: 700; }

      .input-group   { display: flex; align-items: center; gap: 10px; }
      .price-input   { width: 120px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa; font-size: 16px; font-weight: 600; text-align: right; }

      .change-val      { font-size: 16px; font-weight: 700; }
      .change-val.plus { color: #ff4d4f; }
      .change-val.minus{ color: var(--success-green); }

      /* 저장/취소 버튼 */
      .btn-group  { display: flex; gap: 10px; margin-top: 20px; }
      .btn-save   { flex: 1; background: var(--primary-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; }
      .btn-cancel { background: #e9ecef; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 600; cursor: pointer; }

      /* 변경 이력 */
      .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f8f8f8; }
      .history-item:last-child { border-bottom: none; }
      .history-info .name { font-weight: 600; margin-bottom: 4px; }
      .history-info .date { font-size: 12px; color: var(--text-gray); }
      .history-values     { text-align: right; }
      .val-flow           { font-size: 14px; color: #555; }
      .val-diff           { font-size: 13px; font-weight: 600; margin-top: 2px; }
      .diff-up            { color: #ff4d4f; }
      .diff-down          { color: var(--success-green); }
    </style>
  </th:block>
</head>

<body>
<!--
  ※ Controller 작성 가이드 (PriceController.java)
  -------------------------------------------------
  @GetMapping("/prices")
  public String prices(Model model) {
      model.addAttribute("activePage", "priceAdjustment");
      model.addAttribute("isAdmin", true);
      model.addAttribute("pendingPrices", priceService.findPending()); // List<PriceDto>
      model.addAttribute("priceHistory",  priceService.findHistory()); // List<PriceHistoryDto>
      return "pages/price";
  }

  @PostMapping("/prices")
  public String savePrices(@RequestParam Map<String,String> params) {
      priceService.saveAll(params);
      return "redirect:/prices";
  }

  PriceDto 필드:
    - Long   id          : PK
    - String productName : 상품명
    - int    currentPrice: 현재 가격
    - int    newPrice    : 변경 가격
    - String applyDate   : 적용일 (yyyy-MM-dd)

  PriceHistoryDto 필드:
    - String productName : 상품명
    - String changedAt   : 변경일 (yyyy-MM-dd)
    - int    beforePrice : 변경 전 가격
    - int    afterPrice  : 변경 후 가격
    - int    diff        : 차액 (양수=인상, 음수=인하)
-->
<th:block layout:fragment="content">
  <h1 class="page-title">Price Adjustment</h1>

  <!-- 가격 변경 예정 -->
  <div class="section-card">
    <div class="section-header">💰 가격 변경 예정</div>
    <form th:action="@{/prices}" method="post">
      <div th:each="item : ${pendingPrices}" class="adjustment-item">
        <input type="hidden" th:name="'id_' + ${item.id}" th:value="${item.id}">
        <span class="apply-date" th:text="'적용일: ' + ${item.applyDate}">적용일</span>
        <div class="product-name" th:text="${item.productName}">상품명</div>
        <div class="item-row">
          <div>
            <div class="price-label">현재 가격</div>
            <div class="current-val" th:text="'₩' + ${#numbers.formatInteger(item.currentPrice, 0, 'COMMA')}">₩0</div>
          </div>
          <div>
            <div class="price-label">변경 가격</div>
            <div class="input-group">
              <input type="number"
                     class="price-input"
                     th:name="'newPrice_' + ${item.id}"
                     th:value="${item.newPrice}"
                     th:data-current="${item.currentPrice}"
                     oninput="calcDiff(this)">
              <span>원</span>
            </div>
          </div>
          <div>
            <div class="price-label">변동</div>
            <div class="change-val"
                 th:classappend="${item.newPrice > item.currentPrice} ? 'plus' : (${item.newPrice < item.currentPrice} ? 'minus' : '')"
                 th:text="${item.newPrice > item.currentPrice} ? ('+' + ${#numbers.formatInteger(item.newPrice - item.currentPrice, 0, 'COMMA')} + '원') :
                            (${item.newPrice < item.currentPrice} ? (${#numbers.formatInteger(item.newPrice - item.currentPrice, 0, 'COMMA')} + '원') : '0원')">
              0원
            </div>
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button type="submit"  class="btn-save">변경 사항 저장</button>
        <button type="button"  class="btn-cancel">취소</button>
      </div>
    </form>
  </div>

  <!-- 가격 변경 이력 -->
  <div class="section-card">
    <div class="section-header">가격 변경 이력</div>
    <div th:each="h : ${priceHistory}" class="history-item">
      <div class="history-info">
        <div class="name" th:text="${h.productName}">상품명</div>
        <div class="date" th:text="${h.changedAt}">날짜</div>
      </div>
      <div class="history-values">
        <div class="val-flow"
             th:text="'₩' + ${#numbers.formatInteger(h.beforePrice,0,'COMMA')} + ' → ₩' + ${#numbers.formatInteger(h.afterPrice,0,'COMMA')}">
        </div>
        <div class="val-diff"
             th:classappend="${h.diff >= 0} ? 'diff-up' : 'diff-down'"
             th:text="${h.diff >= 0} ? ('+' + ${#numbers.formatInteger(h.diff,0,'COMMA')} + '원') : (${#numbers.formatInteger(h.diff,0,'COMMA')} + '원')">
        </div>
      </div>
    </div>
  </div>
</th:block>

<th:block layout:fragment="scripts">
  <script>
    // 변동액 실시간 계산
    function calcDiff(input) {
      const currentPrice = parseInt(input.dataset.current) || 0;
      const newVal = parseInt(input.value) || 0;
      const diff = newVal - currentPrice;
      const display = input.closest('.adjustment-item').querySelector('.change-val');
      if (diff > 0) {
        display.textContent = '+' + diff.toLocaleString() + '원';
        display.className = 'change-val plus';
      } else if (diff < 0) {
        display.textContent = diff.toLocaleString() + '원';
        display.className = 'change-val minus';
      } else {
        display.textContent = '0원';
        display.className = 'change-val';
      }
    }
  </script>
</th:block>
</body>
</html>
