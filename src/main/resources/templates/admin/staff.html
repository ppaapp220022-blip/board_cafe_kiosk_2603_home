<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
  <title>Staff Management</title>
  <th:block layout:fragment="head-extra">
    <style>
      .header-flex { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
      .page-title  { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
      .page-desc   { color: var(--text-gray); font-size: 15px; }

      /* 추가 버튼 */
      .btn-add-staff {
        background: var(--primary-blue); color: white; border: none;
        padding: 12px 20px; border-radius: 8px; font-weight: 600;
        cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 15px;
      }

      /* 추가 폼 */
      #add-staff-form { display: none; margin-bottom: 30px; }
      .form-card    { background: white; border-radius: 16px; padding: 30px; box-shadow: var(--card-shadow); border: 1px solid #f0f0f0; }
      .form-title   { font-size: 18px; font-weight: 700; margin-bottom: 25px; }
      .form-grid    { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
      .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-gray); margin-bottom: 8px; }
      .form-input, .form-select {
        width: 100%; padding: 12px 15px; border-radius: 8px;
        border: 1px solid #e0e0e0; background: #f8f9fa;
        font-size: 15px; outline: none;
      }
      .form-input:focus { border-color: var(--primary-blue); background: #fff; }
      .btn-row     { display: flex; gap: 12px; }
      .btn-submit  { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
      .btn-cancel  { background: #8e8e93; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }

      /* 테이블 */
      .table-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--card-shadow); border: 1px solid #f0f0f0; }
      table { width: 100%; border-collapse: collapse; }
      th { background: #f8f9fa; padding: 15px 20px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; border-bottom: 1px solid var(--border-color); }
      td { padding: 18px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; vertical-align: middle; }
      tr:last-child td { border-bottom: none; }

      .user-info  { display: flex; align-items: center; gap: 10px; font-weight: 500; }
      .user-icon  { width: 32px; height: 32px; background: #e7f3ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-blue); font-size: 14px; }

      .badge         { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
      .badge-active  { background: #eafaf1; color: #2ecc71; }
      .badge-inactive{ background: #fff0f0; color: var(--danger-red); }

      .role-admin { color: #ff9f43; font-weight: 600; }
      .role-staff { color: #555; }

      .staff-id       { color: var(--primary-blue); font-weight: 600; text-decoration: none; }
      .btn-action-edit {
        background: #ff9f43; color: white; border: none;
        width: 32px; height: 32px; border-radius: 6px;
        cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;
      }
    </style>
  </th:block>
</head>

<body>
<!--
  ※ Controller 작성 가이드 (StaffController.java)
  -------------------------------------------------
  @GetMapping("/staff")
  public String staff(Model model) {
      model.addAttribute("activePage", "staffManagement");
      model.addAttribute("isAdmin", true);
      model.addAttribute("staffList", staffService.findAll()); // List<StaffDto>
      return "pages/staff";
  }

  @PostMapping("/staff")
  public String addStaff(@ModelAttribute StaffDto dto) {
      staffService.save(dto);
      return "redirect:/staff";
  }

  @PostMapping("/staff/{id}/reset-password")
  public String resetPassword(@PathVariable Long id) {
      staffService.resetPassword(id);
      return "redirect:/staff";
  }

  StaffDto 필드:
    - Long   id           : PK
    - String staffId      : 로그인 ID (예: admin001)
    - String name         : 이름
    - String role         : "ADMIN" | "STAFF"
    - String status       : "ACTIVE" | "INACTIVE"
    - String lastLoginAt  : 마지막 로그인 (포맷 문자열)
-->
<th:block layout:fragment="content">
  <div class="header-flex">
    <div>
      <h1 class="page-title">Staff Management</h1>
      <p class="page-desc">Manage staff accounts and permissions</p>
    </div>
    <button class="btn-add-staff" onclick="toggleForm()">+ Add Staff</button>
  </div>

  <!-- 새 직원 추가 폼 -->
  <section id="add-staff-form">
    <div class="form-card">
      <div class="form-title">Add New Staff</div>
      <form th:action="@{/staff}" method="post">
        <div class="form-grid">
          <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" class="form-input" placeholder="Enter staff name">
          </div>
          <div class="form-group">
            <label>Staff ID</label>
            <input type="text" name="staffId" class="form-input" placeholder="Enter staff ID">
          </div>
          <div class="form-group">
            <label>Role</label>
            <select name="role" class="form-select">
              <option value="STAFF">Staff</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>Temporary Password</label>
            <input type="password" name="tempPassword" class="form-input" placeholder="Enter temporary password">
          </div>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn-submit">Add Staff</button>
          <button type="button" class="btn-cancel" onclick="toggleForm()">Cancel</button>
        </div>
      </form>
    </div>
  </section>

  <!-- 직원 목록 테이블 -->
  <div class="table-card">
    <table>
      <thead>
      <tr>
        <th>Staff ID</th>
        <th>Name</th>
        <th>Role</th>
        <th>Status</th>
        <th>Last Login</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="staff : ${staffList}">
        <td>
          <a href="#" class="staff-id" th:text="${staff.staffId}">staff000</a>
        </td>
        <td>
          <div class="user-info">
            <span class="user-icon">👤</span>
            <span th:text="${staff.name}">이름</span>
          </div>
        </td>
        <td>
          <span th:if="${staff.role == 'ADMIN'}" class="role-admin">🛡️ Admin</span>
          <span th:unless="${staff.role == 'ADMIN'}" class="role-staff">👤 Staff</span>
        </td>
        <td>
            <span class="badge"
                  th:classappend="${staff.status == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'"
                  th:text="${staff.status == 'ACTIVE'} ? 'Active' : 'Inactive'">Active</span>
        </td>
        <td th:text="${staff.lastLoginAt}">-</td>
        <td>
          <form th:action="@{/staff/{id}/reset-password(id=${staff.id})}" method="post" style="margin:0;">
            <button type="submit" class="btn-action-edit" title="비밀번호 초기화">🔑</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</th:block>

<th:block layout:fragment="scripts">
  <script>
    function toggleForm() {
      const form = document.getElementById('add-staff-form');
      form.style.display = (form.style.display === 'block') ? 'none' : 'block';
    }
  </script>
</th:block>
</body>
</html>
