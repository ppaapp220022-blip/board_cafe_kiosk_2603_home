<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
  <title>Product Registration</title>
  <th:block layout:fragment="head-extra">
    <style>
      .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
      .page-title  { font-size: 28px; font-weight: 700; }

      /* 탭 */
      .tab-container {
        display: flex; gap: 10px; margin-bottom: 30px;
        background: white; padding: 8px; border-radius: 12px;
        width: fit-content; box-shadow: var(--card-shadow);
      }
      .tab-btn {
        padding: 10px 25px; border-radius: 8px; border: none;
        cursor: pointer; font-weight: 600; background: transparent;
        color: #666; transition: 0.2s;
      }
      .tab-btn.active { background: var(--primary-blue); color: white; }

      /* 상품 그리드 */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
      }
      .product-card {
        background: white; border-radius: 20px; overflow: hidden;
        box-shadow: var(--card-shadow); border: 1px solid #f0f0f0; position: relative;
      }

      .img-placeholder {
        height: 200px; background: #f9f9f9;
        display: flex; align-items: center; justify-content: center;
        position: relative; font-size: 48px;
      }
      .sold-out-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.4);
        display: flex; align-items: center; justify-content: center;
        color: white; font-weight: 700; font-size: 20px;
      }

      .card-body     { padding: 20px; }
      .product-name  { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
      .product-price { font-size: 16px; font-weight: 700; color: var(--primary-blue); margin-bottom: 15px; }
      .stock-info    { background: #f1f3f5; padding: 8px 12px; border-radius: 8px; font-size: 13px; color: #666; margin-bottom: 15px; }

      .card-actions { display: flex; gap: 8px; }
      .btn-action {
        flex: 1; padding: 10px; border-radius: 8px; border: none;
        font-weight: 600; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 14px;
      }
      .btn-edit    { background: #edf2ff; color: var(--primary-blue); }
      .btn-delete  { background: #fff5f5; color: var(--danger-red); width: 45px; flex: none; }
      .btn-soldout { background: #fff5f5; color: var(--danger-red); }
      .btn-instock { background: #ebfbee; color: var(--success-green); }

      /* 추가 버튼 */
      .btn-add-product {
        background: var(--primary-blue); color: white; border: none;
        padding: 10px 20px; border-radius: 8px; font-weight: 600;
        cursor: pointer; display: flex; align-items: center; gap: 8px;
      }

      /* 모달 */
      .modal {
        display: none; position: fixed; top: 0; left: 0;
        width: 100%; height: 100%; background: rgba(0,0,0,0.5);
        z-index: 1000; align-items: center; justify-content: center;
      }
      .modal-content {
        background: white; padding: 30px; border-radius: 20px;
        width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      }
      .modal-header { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
      .form-group   { margin-bottom: 15px; }
      .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #666; }
      .form-group input,
      .form-group select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
      .modal-footer { display: flex; gap: 10px; margin-top: 25px; }
      .btn-save   { flex: 2; background: var(--primary-blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; }
      .btn-cancel { flex: 1; background: #eee; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
  </th:block>
</head>

<body>
<!--
  ※ Controller 작성 가이드 (ProductController.java)
  --------------------------------------------------
  @GetMapping("/products")
  public String products(Model model,
                         @RequestParam(defaultValue = "game") String tab) {
      model.addAttribute("activePage", "productReg");
      model.addAttribute("isAdmin", true);
      model.addAttribute("activeTab",   tab);
      model.addAttribute("gameList",    productService.findByCategory("game")); // List<ProductDto>
      model.addAttribute("foodList",    productService.findByCategory("food")); // List<ProductDto>
      return "pages/product";
  }

  @PostMapping("/products")
  public String addProduct(@ModelAttribute ProductDto dto) {
      productService.save(dto);
      return "redirect:/products?tab=" + dto.getCategory();
  }

  @PostMapping("/products/{id}/delete")
  public String deleteProduct(@PathVariable Long id) {
      productService.delete(id);
      return "redirect:/products";
  }

  @PostMapping("/products/{id}/soldout")
  public String toggleSoldOut(@PathVariable Long id) {
      productService.toggleSoldOut(id);
      return "redirect:/products?tab=food";
  }

  ProductDto 필드:
    - Long   id          : PK
    - String category    : "game" | "food"
    - String name        : 상품명
    - int    price       : 가격 (0이면 무료)
    - int    stock       : 현재 재고 (게임 전용)
    - int    maxStock    : 최대 재고 (게임 전용)
    - boolean soldOut    : 품절 여부 (식음료 전용)
-->
<th:block layout:fragment="content">
  <div class="header-flex">
    <h1 class="page-title">Product Registration</h1>
    <button class="btn-add-product" onclick="openModal()">+ 상품 추가</button>
  </div>

  <!-- 탭 -->
  <div class="tab-container">
    <button class="tab-btn"
            th:classappend="${activeTab == 'game'} ? 'active'"
            onclick="switchTab('game')">Game Registration</button>
    <button class="tab-btn"
            th:classappend="${activeTab == 'food'} ? 'active'"
            onclick="switchTab('food')">Food &amp; Drinks Registration</button>
  </div>

  <!-- 보드게임 섹션 -->
  <div id="game-section"
       class="product-grid"
       th:style="${activeTab == 'game'} ? 'display:grid' : 'display:none'">
    <div th:each="product : ${gameList}" class="product-card">
      <div class="img-placeholder">🖼️</div>
      <div class="card-body">
        <div class="product-name"  th:text="${product.name}">상품명</div>
        <div class="product-price" th:text="${product.price == 0} ? '무료' : '₩' + ${#numbers.formatInteger(product.price, 0, 'COMMA')}">무료</div>
        <div class="stock-info"    th:text="'Current Stock: ' + ${product.stock} + ' / ' + ${product.maxStock}">재고</div>
        <div class="card-actions">
          <button class="btn-action btn-edit">📝 수정</button>
          <!-- CSRF 토큰은 Spring Security 사용 시 th:action이 자동 처리 -->
          <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:contents;">
            <button type="submit" class="btn-action btn-delete">🗑️</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 식음료 섹션 -->
  <div id="food-section"
       class="product-grid"
       th:style="${activeTab == 'food'} ? 'display:grid' : 'display:none'">
    <div th:each="product : ${foodList}" class="product-card">
      <div class="img-placeholder">
        <div class="sold-out-overlay" th:if="${product.soldOut}">SOLD OUT</div>
        🖼️
      </div>
      <div class="card-body">
        <div class="product-name"  th:text="${product.name}">상품명</div>
        <div class="product-price" th:text="'₩' + ${#numbers.formatInteger(product.price, 0, 'COMMA')}">₩0</div>
        <div class="card-actions">
          <form th:action="@{/products/{id}/soldout(id=${product.id})}" method="post" style="display:contents;">
            <button type="submit" class="btn-action"
                    th:classappend="${product.soldOut} ? 'btn-instock' : 'btn-soldout'"
                    th:text="${product.soldOut} ? '재고있음' : '품절처리'">품절처리</button>
          </form>
          <button class="btn-action btn-edit">📝 수정</button>
          <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:contents;">
            <button type="submit" class="btn-action btn-delete">🗑️</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</th:block>

<!-- 상품 추가 모달 -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">새 상품 등록</div>
    <form th:action="@{/products}" method="post">
      <div class="form-group">
        <label>카테고리</label>
        <select name="category" id="prod-category" onchange="toggleStockInput(this.value)">
          <option value="game">보드게임</option>
          <option value="food">음식/음료</option>
        </select>
      </div>
      <div class="form-group">
        <label>상품명</label>
        <input type="text" name="name" placeholder="예: 루미큐브, 카페라떼">
      </div>
      <div class="form-group">
        <label>가격 (무료일 경우 0 입력)</label>
        <input type="number" name="price" placeholder="예: 4500">
      </div>
      <div class="form-group" id="stock-input">
        <label>초기 재고량 (게임 전용)</label>
        <input type="number" name="maxStock" value="1">
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn-save">등록하기</button>
        <button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
      </div>
    </form>
  </div>
</div>

<th:block layout:fragment="scripts">
  <script>
    // 탭 전환
    function switchTab(type) {
      document.getElementById('game-section').style.display = (type === 'game') ? 'grid' : 'none';
      document.getElementById('food-section').style.display = (type === 'food') ? 'grid' : 'none';
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0) === (type === 'game'));
      });
    }
    // 모달 제어
    function openModal()  { document.getElementById('productModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    // 재고 입력 토글 (게임 전용)
    function toggleStockInput(val) {
      document.getElementById('stock-input').style.display = (val === 'game') ? 'block' : 'none';
    }
  </script>
</th:block>
</body>
</html>
