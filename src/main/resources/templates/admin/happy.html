<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
  <title>Happy Hour Settings</title>
  <th:block layout:fragment="head-extra">
    <style>
      .page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
      .page-title  { font-size: 28px; font-weight: 700; }

      /* 탭 */
      .tab-group { display: flex; gap: 10px; margin-bottom: 25px; }
      .tab-btn {
        padding: 10px 25px; border-radius: 10px; border: none;
        font-weight: 600; cursor: pointer; background: white; color: #333;
        transition: 0.2s; box-shadow: var(--card-shadow);
      }
      .tab-btn.active { background: var(--primary-blue); color: white; }

      /* 컨텐츠 카드 */
      .content-card {
        background: white; border-radius: 20px; padding: 30px;
        box-shadow: var(--card-shadow); border: 1px solid #f0f0f0;
      }
      .section-subtitle { font-size: 16px; font-weight: 700; margin-bottom: 20px; }

      /* 스케줄 행 */
      .schedule-row {
        display: flex; align-items: center;
        padding: 15px 20px; border: 1px solid #f0f0f0;
        border-radius: 12px; margin-bottom: 12px; transition: 0.2s;
      }
      .schedule-row:hover { border-color: var(--primary-blue); }
      .schedule-row.disabled { opacity: 0.6; }
      .day-label { width: 80px; font-weight: 600; }

      /* 토글 스위치 */
      .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; margin-right: 20px; flex-shrink: 0; }
      .toggle-switch input { opacity: 0; width: 0; height: 0; }
      .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
      .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
      input:checked + .slider { background-color: var(--primary-blue); }
      input:checked + .slider:before { transform: translateX(20px); }

      /* 시간 범위 */
      .time-range { display: flex; align-items: center; gap: 10px; flex-grow: 1; justify-content: center; }
      .time-input { padding: 8px 12px; border-radius: 8px; border: 1px solid #eee; background: #f8f9fa; font-size: 14px; font-weight: 500; }

      /* 할인율 입력 */
      .discount-input-group { display: flex; align-items: center; gap: 5px; width: 100px; justify-content: flex-end; }
      .discount-input { width: 50px; padding: 8px; border-radius: 8px; border: 1px solid #eee; text-align: center; font-weight: 700; color: var(--primary-blue); }

      /* 저장 버튼 */
      .btn-submit { width: 100%; padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; margin-top: 20px; cursor: pointer; }

      /* 이력 */
      .history-item { border: 1px solid #f0f0f0; border-radius: 12px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
      .history-main  { display: flex; flex-direction: column; gap: 5px; }
      .history-title { font-weight: 700; font-size: 16px; }
      .history-date  { font-size: 13px; color: var(--text-gray); }
      .discount-badge { display: inline-block; padding: 4px 10px; background: #e7f3ff; color: var(--primary-blue); border-radius: 6px; font-size: 12px; font-weight: 700; width: fit-content; }
      .btn-restore { background: var(--primary-blue); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
  </th:block>
</head>

<body>
<!--
  ※ Controller 작성 가이드 (HappyHourController.java)
  -----------------------------------------------------
  @GetMapping("/happy-hour")
  public String happyHour(Model model,
                          @RequestParam(defaultValue = "current") String tab) {
      model.addAttribute("activePage", "happyHour");
      model.addAttribute("isAdmin", true);
      model.addAttribute("activeTab",   tab);
      model.addAttribute("scheduleList", happyHourService.findWeeklySchedule()); // List<HappyHourDto>
      model.addAttribute("historyList",  happyHourService.findHistory());        // List<HappyHourHistoryDto>
      return "pages/hour";
  }

  @PostMapping("/happy-hour")
  public String saveSchedule(@ModelAttribute HappyHourFormDto form) {
      happyHourService.saveAll(form.getSchedules());
      return "redirect:/happy-hour";
  }

  @PostMapping("/happy-hour/{id}/restore")
  public String restore(@PathVariable Long id) {
      happyHourService.restore(id);
      return "redirect:/happy-hour";
  }

  HappyHourDto 필드:
    - Long    id        : PK
    - String  dayName   : 요일명 (월요일, 화요일, ...)
    - boolean enabled   : 활성화 여부
    - String  startTime : 시작 시간 (HH:mm)
    - String  endTime   : 종료 시간 (HH:mm)
    - int     discount  : 할인율 (%)

  HappyHourHistoryDto 필드:
    - Long   id         : PK
    - String description: 설명 (예: 평일 14:00-17:00)
    - String period     : 기간 (예: 2026-01-01 ~ 2026-02-28)
    - int    discount   : 할인율 (%)
-->
<th:block layout:fragment="content">
  <div class="page-header">
    <span style="font-size: 24px;">☕</span>
    <h1 class="page-title">Happy Hour Settings</h1>
  </div>

  <!-- 탭 -->
  <div class="tab-group">
    <button class="tab-btn"
            th:classappend="${activeTab == 'current'} ? 'active'"
            onclick="switchTab('current')">Current Schedule</button>
    <button class="tab-btn"
            th:classappend="${activeTab == 'history'} ? 'active'"
            onclick="switchTab('history')">History</button>
  </div>

  <!-- 현재 스케줄 -->
  <div id="current-section"
       th:style="${activeTab == 'current'} ? 'display:block' : 'display:none'">
    <div class="content-card">
      <div class="section-subtitle">🕒 주간 스케줄</div>
      <form th:action="@{/happy-hour}" method="post">
        <div th:each="schedule : ${scheduleList}"
             class="schedule-row"
             th:classappend="${!schedule.enabled} ? 'disabled'">
          <input type="hidden" th:name="'id_' + ${schedule.id}" th:value="${schedule.id}">
          <label class="toggle-switch">
            <input type="checkbox"
                   th:name="'enabled_' + ${schedule.id}"
                   th:checked="${schedule.enabled}"
                   onchange="toggleRow(this)">
            <span class="slider"></span>
          </label>
          <div class="day-label" th:text="${schedule.dayName}">요일</div>
          <div class="time-range">
            <input type="text" class="time-input"
                   th:name="'startTime_' + ${schedule.id}"
                   th:value="${schedule.enabled} ? ${schedule.startTime} : '-- : --'"
                   th:disabled="${!schedule.enabled}">
            <span>~</span>
            <input type="text" class="time-input"
                   th:name="'endTime_' + ${schedule.id}"
                   th:value="${schedule.enabled} ? ${schedule.endTime} : '-- : --'"
                   th:disabled="${!schedule.enabled}">
          </div>
          <div class="discount-input-group">
            <span style="color: var(--primary-blue); font-weight:700;">%</span>
            <input type="number" class="discount-input"
                   th:name="'discount_' + ${schedule.id}"
                   th:value="${schedule.discount}"
                   th:disabled="${!schedule.enabled}">
            <span>%</span>
          </div>
        </div>
        <button type="submit" class="btn-submit">변경 사항 저장</button>
      </form>
    </div>
  </div>

  <!-- 이력 -->
  <div id="history-section"
       th:style="${activeTab == 'history'} ? 'display:block' : 'display:none'">
    <div class="content-card">
      <div class="section-subtitle">Past Happy Hour Policies</div>
      <div th:each="h : ${historyList}" class="history-item">
        <div class="history-main">
          <div class="history-title"  th:text="${h.description}">설명</div>
          <div class="history-date"   th:text="${h.period}">기간</div>
          <div class="discount-badge" th:text="${h.discount} + '% 할인'">0% 할인</div>
        </div>
        <form th:action="@{/happy-hour/{id}/restore(id=${h.id})}" method="post">
          <button type="submit" class="btn-restore">🔄 Restore</button>
        </form>
      </div>
    </div>
  </div>
</th:block>

<th:block layout:fragment="scripts">
  <script>
    function switchTab(tab) {
      const isCurrent = tab === 'current';
      document.getElementById('current-section').style.display = isCurrent ? 'block' : 'none';
      document.getElementById('history-section').style.display = isCurrent ? 'none'  : 'block';
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0) === isCurrent);
      });
    }

    // 토글 ON/OFF 시 행 내 입력 활성화 처리
    function toggleRow(checkbox) {
      const row = checkbox.closest('.schedule-row');
      const inputs = row.querySelectorAll('input[type="text"], input[type="number"]');
      row.classList.toggle('disabled', !checkbox.checked);
      inputs.forEach(inp => inp.disabled = !checkbox.checked);
    }
  </script>
</th:block>
</body>
</html>
