<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>정산 - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      background-color: #f4f6f8;
    }

    /* 중앙 정렬 컨테이너 */
    .container {
      width: 100%;
      max-width: 700px;
      padding: 20px;
      box-sizing: border-box;
      max-height: 90vh;
      overflow-y: auto;
    }

    .container::-webkit-scrollbar {
      width: 8px;
    }

    .container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .container::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 10px;
    }

    .container::-webkit-scrollbar-thumb:hover {
      background: #888;
    }

    .page-title {
      font-size: 2.5rem;
      margin: 0 0 30px 0;
      color: #111;
      text-align: center;
      font-weight: 700;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
    }

    .card-header i {
      width: 28px;
      height: 28px;
      color: #007bff;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 1.1rem;
      color: #333;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-qty {
      color: #888;
      font-size: 1rem;
      margin-right: 10px;
    }

    .price {
      color: #007bff;
      font-weight: bold;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      color: #333;
      font-size: 1.2rem;
    }

    .summary-row.subtotal {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eaeaea;
      color: #888;
    }

    .final-amount {
      background: #eef6ff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 2px solid #d0e4ff;
      padding: 30px;
      border-radius: 24px;
    }

    .final-amount span {
      font-size: 1.5rem;
      color: #111;
      font-weight: bold;
    }

    .final-amount .total {
      font-size: 3.2rem;
      font-weight: 800;
      color: #007bff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .final-amount i {
      width: 36px;
      height: 36px;
    }

    .cash-notice {
      background: #fff8e1;
      border: 1px solid #ffe082;
      color: #d84315;
      padding: 20px;
      border-radius: 16px;
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }

    .cash-notice i {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .cash-notice-content h3 {
      margin: 0 0 5px 0;
      font-weight: 600;
      font-size: 1rem;
    }

    .cash-notice-content p {
      margin: 0;
      font-size: 0.9rem;
      color: #888;
    }

    /* 결제 수단 선택 */
    .payment-methods {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .payment-method {
      padding: 20px;
      border: 2px solid #eaeaea;
      border-radius: 16px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .payment-method:hover {
      border-color: #007bff;
      background: #eef6ff;
    }

    .payment-method.active {
      border-color: #007bff;
      background: #eef6ff;
    }

    .payment-method i {
      width: 32px;
      height: 32px;
      color: #007bff;
      margin-bottom: 10px;
    }

    .payment-method-name {
      font-weight: 600;
      color: #333;
      font-size: 1rem;
    }

    /* 하단 결제 버튼 */
    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .pay-btn, .back-link-btn {
      flex: 1;
      padding: 25px;
      border: none;
      border-radius: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      transition: all 0.2s ease;
    }

    .pay-btn {
      background: #007bff;
      color: white;
      box-shadow: 0 10px 25px rgba(0, 123, 255, 0.3);
    }

    .pay-btn:hover {
      background: #0056b3;
      box-shadow: 0 12px 30px rgba(0, 123, 255, 0.4);
    }

    .pay-btn:active {
      transform: scale(0.98);
    }

    .pay-btn i {
      width: 28px;
      height: 28px;
    }

    .back-link-btn {
      background: #f0f2f5;
      color: #888;
    }

    .back-link-btn:hover {
      background: #e0e2e7;
      color: #555;
    }

    .back-link-btn i {
      width: 24px;
      height: 24px;
    }

    .empty-cart-notice {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }

    .empty-cart-notice i {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-cart-notice h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 class="page-title">Final Checkout</h1>

  <!-- 주문 내역 카드 -->
  <div class="card" id="order-summary">
    <div class="card-header"><i data-lucide="shopping-bag"></i> Order Summary</div>
    <!-- 동적 콘텐츠 -->
  </div>

  <!-- 세션 정보 카드 -->
  <div class="card" id="session-info">
    <div class="card-header"><i data-lucide="file-text"></i> Session Details</div>
    <div class="summary-row">
            <span style="color:#888; display:flex; align-items:center; gap:8px;">
                <i data-lucide="clock" style="width:20px; height:20px;"></i> Total Usage Time
            </span>
      <span th:text="${sessionHours} + 'h ' + ${sessionMinutes} + 'm'">0h 45m</span>
    </div>
    <div class="summary-row">
            <span style="color:#888; display:flex; align-items:center; gap:8px;">
                <i data-lucide="users" style="width:20px; height:20px;"></i> Party Size
            </span>
      <span th:text="${partySize} + ' people'">2 people</span>
    </div>
  </div>

  <!-- 최종 금액 카드 -->
  <div class="card">
    <div class="final-amount">
      <span>Final Amount</span>
      <div class="total">
        <i data-lucide="dollar-sign"></i>
        <span id="final-total">₩0</span>
      </div>
    </div>
  </div>

  <!-- 현금 결제 안내 -->
  <div class="card">
    <div class="cash-notice">
      <i data-lucide="banknote"></i>
      <div class="cash-notice-content">
        <h3>현금 결제 안내</h3>
        <p>현금 결제는 카운터 직원에게 직접 요청해 주세요.</p>
      </div>
    </div>
  </div>

  <!-- 결제 수단 선택 -->
  <div class="card">
    <div class="card-header"><i data-lucide="credit-card"></i> Payment Method</div>
    <div class="payment-methods">
      <div class="payment-method active" onclick="selectPaymentMethod('CARD', this)">
        <i data-lucide="credit-card"></i>
        <div class="payment-method-name">카드 결제</div>
      </div>
      <div class="payment-method" onclick="selectPaymentMethod('MOBILE', this)">
        <i data-lucide="smartphone"></i>
        <div class="payment-method-name">모바일 결제</div>
      </div>
    </div>
  </div>

  <!-- 결제 버튼 -->
  <div class="button-group">
    <button class="pay-btn" id="pay-btn" onclick="processPayment()">
      <i data-lucide="credit-card"></i> Pay with Card
    </button>
    <button class="back-link-btn" onclick="history.back()">
      <i data-lucide="arrow-left"></i> Go Back
    </button>
  </div>
</div>

<script>
  lucide.createIcons({
    attrs: { 'stroke-width': 2.5 }
  });

  const tableNumber = document.querySelector('html').getAttribute('data-table') || '5';
  let selectedPaymentMethod = 'CARD';

  // ===== 페이지 로드 =====
  document.addEventListener('DOMContentLoaded', function() {
    loadCheckoutData();
  });

  // ===== 정산 데이터 로드 =====
  function loadCheckoutData() {
    fetch('/api/cart')
            .then(response => response.json())
            .then(data => {
              if (data.success) {
                renderCheckout(data.cartItems, data.totalPrice);
              }
            })
            .catch(error => {
              console.error('Error loading checkout:', error);
              showErrorPage();
            });
  }

  // ===== 정산 페이지 렌더링 =====
  function renderCheckout(cartItems, totalPrice) {
    if (cartItems.length === 0) {
      document.getElementById('order-summary').innerHTML = `
        <div class="empty-cart-notice">
          <i data-lucide="shopping-cart"></i>
          <h2>장바구니가 비어있습니다</h2>
          <p>메뉴에서 상품을 추가해주세요.</p>
        </div>
      `;
      document.getElementById('pay-btn').disabled = true;
      lucide.createIcons();
      return;
    }

    // 주문 내역 렌더링
    const orderSummary = cartItems.map(item => `
      <div class="order-item">
        <div>
          <span>${item.itemName}</span>
          <span class="order-qty">x${item.quantity}</span>
        </div>
        <div class="price">₩${(item.price * item.quantity).toLocaleString()}</div>
      </div>
    `).join('');

    document.getElementById('order-summary').innerHTML = `
      <div class="card-header"><i data-lucide="shopping-bag"></i> Order Summary</div>
      ${orderSummary}
      <div class="summary-row subtotal">
        <span>Subtotal</span>
        <span>₩${totalPrice.toLocaleString()}</span>
      </div>
    `;

    // 최종 금액 업데이트
    document.getElementById('final-total').innerText = `₩${totalPrice.toLocaleString()}`;

    lucide.createIcons();
  }

  // ===== 결제 수단 선택 =====
  function selectPaymentMethod(method, element) {
    selectedPaymentMethod = method;

    // 모든 결제 수단 비활성화
    document.querySelectorAll('.payment-method').forEach(el => {
      el.classList.remove('active');
    });

    // 선택된 것만 활성화
    element.classList.add('active');

    // 버튼 텍스트 업데이트
    const payBtn = document.getElementById('pay-btn');
    if (method === 'CARD') {
      payBtn.innerHTML = '<i data-lucide="credit-card"></i> Pay with Card';
    } else {
      payBtn.innerHTML = '<i data-lucide="smartphone"></i> Pay with Mobile';
    }
    lucide.createIcons();
  }

  // ===== 결제 처리 =====
  function processPayment() {
    const totalPrice = document.getElementById('final-total').innerText;

    if (!confirm(`${totalPrice}를 ${selectedPaymentMethod === 'CARD' ? '카드' : '모바일'}로 결제하시겠습니까?`)) {
      return;
    }

    const payBtn = document.getElementById('pay-btn');
    payBtn.disabled = true;
    payBtn.innerText = '결제 처리 중...';

    fetch('/api/checkout/pay', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        paymentMethod: selectedPaymentMethod,
        amount: parseInt(totalPrice.replace(/₩|,/g, ''))
      })
    })
            .then(response => response.json())
            .then(data => {
              if (data.success) {
                showSuccessPage(data.orderId, totalPrice);
              } else {
                showToast('결제에 실패했습니다. 다시 시도해주세요.');
                payBtn.disabled = false;
                payBtn.innerHTML = '<i data-lucide="credit-card"></i> Pay with Card';
              }
            })
            .catch(error => {
              console.error('Payment error:', error);
              showToast('결제 처리에 오류가 발생했습니다.');
              payBtn.disabled = false;
              payBtn.innerHTML = '<i data-lucide="credit-card"></i> Pay with Card';
            });
  }

  // ===== 결제 성공 페이지 =====
  function showSuccessPage(orderId, amount) {
    document.body.innerHTML = `
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); color: white; text-align: center;">
        <i data-lucide="check-circle" style="width: 120px; height: 120px; margin-bottom: 30px;"></i>
        <h1 style="font-size: 2.5rem; margin: 0 0 20px 0; font-weight: 700;">결제 완료</h1>
        <p style="font-size: 1.2rem; margin: 0 0 10px 0; opacity: 0.9;">주문이 완료되었습니다.</p>
        <p style="font-size: 1.3rem; margin: 0 0 30px 0; font-weight: bold; opacity: 0.8;">주문번호: ${orderId}</p>
        <p style="font-size: 1.5rem; margin: 0 0 50px 0; font-weight: bold;">${amount}</p>
        <p style="font-size: 1rem; margin: 0; opacity: 0.8;">이용해주셔서 감사합니다!</p>
        <p style="font-size: 0.95rem; margin: 20px 0 0 0; opacity: 0.7;">3초 후 메인 화면으로 이동합니다...</p>
      </div>
    `;

    lucide.createIcons();
    setTimeout(() => {
      window.location.href = `/kiosk/drinks?tableNumber=${tableNumber}`;
    }, 3000);
  }

  // ===== 에러 페이지 =====
  function showErrorPage() {
    document.body.innerHTML = `
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; background: #f4f6f8; text-align: center;">
        <i data-lucide="alert-circle" style="width: 100px; height: 100px; color: #f44336; margin-bottom: 20px;"></i>
        <h1 style="font-size: 2rem; margin: 0 0 10px 0; color: #333;">오류가 발생했습니다</h1>
        <p style="color: #888; margin: 0 0 30px 0;">장바구니 정보를 불러올 수 없습니다.</p>
        <button onclick="history.back()" style="padding: 15px 30px; background: #007bff; color: white; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer;">돌아가기</button>
      </div>
    `;
    lucide.createIcons();
  }

  // ===== 토스트 알림 =====
  function showToast(message) {
    const toast = document.createElement('div');
    toast.style.cssText = `
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #333;
      color: white;
      padding: 15px 25px;
      border-radius: 12px;
      z-index: 2000;
      animation: slideInUp 0.3s ease;
    `;
    toast.innerText = message;
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2000);
  }
</script>
</body>
</html>
