<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOARD WAVE - AI Guide Kiosk</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root {
      --wood-dark: #3E2723;
      --wood-warm: #5D4037;
      --guide-blue: #0288D1;
      --accent-yellow: #FFD54F;
      --paper-bg: #FFFDE7;
      --bg-color: #F5F5F5;
      --back-btn-bg: #ffffff;
      --error-red: #E53935;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--wood-dark);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .kiosk-frame {
      width: 1080px;
      height: 680px;
      background: var(--bg-color);
      display: flex;
      border: 12px solid #2D1B18;
      border-radius: 40px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      overflow: hidden;
      position: relative;
    }

    /* 🔙 화살표가 포함된 메뉴로 돌아가기 버튼 (디자인 유지) */
    .btn-back-menu {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 100;
      background: var(--back-btn-bg);
      border: 3px solid var(--wood-dark);
      border-radius: 50px;
      padding: 10px 25px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 6px 0 var(--wood-dark);
      transition: all 0.1s ease;
    }

    .btn-back-menu:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 var(--wood-dark);
    }

    .btn-back-menu .icon {
      font-size: 1.8rem;
    }

    .btn-back-menu .text {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--wood-dark);
    }

    /* 왼쪽: AI 친구 (가이드 모드) */
    .ai-guide-zone {
      flex: 1.2;
      background: #E1F5FE;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      border-right: 2px solid #B3E5FC;
      padding-top: 80px;
    }

    .ai-character {
      width: 150px;
      height: 150px;
      background: var(--guide-blue);
      border-radius: 40% 40% 50% 50%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 5px solid var(--wood-dark);
      box-shadow: 0 15px 30px rgba(2, 136, 209, 0.3);
      transition: 0.3s;
    }

    .eyes { display: flex; gap: 25px; }
    .eye { width: 12px; height: 12px; background: white; border-radius: 50%; transition: 0.3s; }

    /* 경청/분석 애니메이션 */
    .listening .ai-character, .analyzing .ai-character {
      animation: float 1.5s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .listening .eye { transform: scaleY(0.2); } /* 경청 중 */
    .analyzing .eye { animation: blink 0.3s infinite; } /* 분석 중 */
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .stt-bubble {
      margin-top: 30px;
      background: white;
      padding: 20px 30px;
      border-radius: 25px;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--wood-dark);
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      max-width: 90%;
      min-height: 1.5em;
    }

    /* 오른쪽: 설명 콘텐츠 영역 */
    .content-zone {
      flex: 1.5;
      background: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .content-header {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--guide-blue);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 설명 카드 스타일 (기존) */
    .info-card {
      background: var(--paper-bg);
      border-left: 8px solid var(--guide-blue);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      line-height: 1.6;
      color: #333;
    }

    .info-card h3 { margin-top: 0; color: var(--wood-dark); }

    /* [추가] 게임을 찾을 수 없을 때의 결과 카드 스타일 */
    .error-card {
      background: #FFFEB2; /* 약간 더 진한 경고색 */
      border-left: 8px solid var(--error-red);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      text-align: center;
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* [핵심] 찾을 수 없는 게임 이미지 (CSS 일러스트) */
    .not-found-image {
      width: 100%;
      height: 180px;
      background: #E0F2F1;
      border-radius: 15px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 5rem;
      position: relative;
      border: 3px dashed #80CBC4;
    }
    .not-found-image::after {
      content: '?';
      position: absolute;
      color: #80CBC4;
      font-weight: 900;
      opacity: 0.7;
    }

    .error-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--wood-dark);
      margin-bottom: 10px;
    }

    .error-msg {
      font-size: 1rem;
      color: #555;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* 환류(피드백) 영역 */
    .feedback-box {
      margin-top: 30px;
      padding: 20px;
      background: #F5F5F5;
      border-radius: 20px;
      display: none;
    }
    .feedback-box.active { display: block; animation: slideUp 0.3s; }

    @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    textarea {
      width: 100%; border: 1.5px solid #ddd; border-radius: 12px;
      padding: 12px; margin-top: 10px; font-family: inherit; font-size: 1rem;
      box-sizing: border-box;
    }

    /* 하단 버튼 */
    .action-btns { display: flex; gap: 15px; margin-top: auto; padding-top: 20px; }
    .btn {
      flex: 1; padding: 20px; border-radius: 15px; border: none;
      font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s;
    }
    .btn-retry { background: #E0E0E0; color: #666; }
    .btn-confirm { background: var(--guide-blue); color: white; }

    .mic-btn {
      position: absolute; bottom: 30px; left: 30px;
      width: 80px; height: 80px; border-radius: 50%;
      background: #FF5252; border: 4px solid var(--wood-dark);
      font-size: 2rem; color: white; cursor: pointer;
      box-shadow: 0 8px 0 #C62828; z-index: 10;
    }
    .mic-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #C62828; }
  </style>
</head>
<body>

<div class="kiosk-frame">
  <div class="btn-back-menu" onclick="resetAll()">
    <span class="icon">🔙</span>
    <span class="text">메뉴로 돌아가기</span>
  </div>

  <div class="ai-guide-zone" id="aiZone">
    <div class="ai-character" id="char">
      <div class="eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
    </div>

    <div class="stt-bubble" id="sttDisplay">
      "스플렌더 게임 설명해줘!" 혹은<br>"패키지 요금제가 뭐야?"라고 물어보세요.
    </div>

    <button class="mic-btn" onclick="askAI()">🎤</button>
  </div>

  <div class="content-zone">
    <div class="content-header" id="contentHeader">🔍 AI 가이드의 설명</div>

    <div id="displayArea" style="flex:1;">
      <div style="text-align:center; color:#bbb; margin-top:120px;" id="emptyMsg">
        보드웨이브 AI가 게임 사용법에 대한 궁금한 점을 해결해 드립니다.
      </div>
    </div>

    <div class="feedback-box" id="feedbackBox">
      <span style="font-weight: 800; color: var(--guide-blue);">💡 설명이 부족한가요?</span>
      <p style="font-size: 0.85rem; color: #777; margin: 5px 0;">구체적으로 다시 질문하거나 키워드를 수정해보세요.</p>
      <textarea id="correctionInput" rows="2"></textarea>
      <button class="btn btn-confirm" style="width:100%; margin-top:10px; padding:10px;" onclick="applyFeedback()">다시 질문하기</button>
    </div>

    <div class="action-btns">
      <button class="btn btn-retry" onclick="toggleFeedback()">설명 수정 요청</button>
      <button class="btn btn-confirm" onclick="resetAll()">메뉴로 이동</button>
    </div>
  </div>
</div>

<script>
  let isListening = false;

  function askAI() {
    if(isListening) return;

    const aiZone = document.getElementById('aiZone');
    const sttDisplay = document.getElementById('sttDisplay');

    isListening = true;
    aiZone.classList.add('analyzing'); // 분석 중 애니메이션
    sttDisplay.innerText = "질문을 분석하고 있어요...";

    // 시뮬레이션: 질문 인식 (게임 설명 vs 요금제 설명 vs 없는 게임)
    setTimeout(() => {
      const mockQuestions = ["스플렌더 게임 설명해줘", "패키지 요금제 알려줘", "우주 정복 게임 설명해줘"];
      // 랜덤으로 질문 하나 선택
      const finalQuestion = mockQuestions[Math.floor(Math.random() * mockQuestions.length)];
      provideExplanation(finalQuestion);
    }, 2500);
  }

  function provideExplanation(text) {
    isListening = false;
    document.getElementById('aiZone').classList.remove('analyzing');
    document.getElementById('sttDisplay').innerText = `"${text}"`;
    document.getElementById('correctionInput').value = text;

    const displayArea = document.getElementById('displayArea');
    document.getElementById('emptyMsg').style.display = 'none';

    if(text.includes("스플렌더")) {
      // 기존 로직 유지
      displayArea.innerHTML = `
                <div class="info-card">
                    <h3>💎 스플렌더 (Splendor)</h3>
                    <p><strong>게임 인원:</strong> 2~4명 (4명 추천)</p>
                    <p><strong>한 줄 설명:</strong> 보석 상인이 되어 자원을 모으고 명성 점수 15점을 먼저 획득하는 게임입니다.</p>
                    <hr style="border:0; border-top:1px solid #ddd; margin:15px 0;">
                    <p><strong>핵심 규칙:</strong><br>1. 보석 토큰을 가져오거나<br>2. 카드를 구매하여 영구적인 할인을 얻거나<br>3. 귀족의 방문을 받아 추가 점수를 얻으세요!</p>
                </div>
            `;
    } else if(text.includes("패키지")) {
      // 기존 로직 유지
      displayArea.innerHTML = `
                <div class="info-card">
                    <h3>🏷️ 패키지 요금제 안내</h3>
                    <p>보드웨이브에서는 장시간 이용 고객님을 위해 특별 패키지를 운영 중입니다.</p>
                    <ul style="padding-left: 20px;">
                        <li><strong>3시간 패키지:</strong> 9,000원 (음료 1잔 포함)</li>
                        <li><strong>평일 종일권:</strong> 15,000원 (선착순 판매)</li>
                    </ul>
                    <p style="font-size: 0.9rem; color: #666;">* 모든 패키지는 1인당 요금입니다.</p>
                </div>
            `;
    } else {
      // [핵심] 없는 게임에 대한 설명 요청 시의 결과 UI 생성
      displayArea.innerHTML = `
                <div class="error-card">
                    <div class="not-found-image">🧩</div>

                    <div class="error-title">앗! 그 게임은 아직 보드웨이브에 없어요.</div>
                    <div class="error-msg">
                        요청하신 게임 정보를 열심히 찾아봤지만, 우리 카페에서는 발견하지 못했습니다.
                        혹시 다른 게임이 궁금하시다면 다시 음성으로 물어봐 주세요!
                    </div>
                </div>
            `;
    }
  }

  function toggleFeedback() {
    document.getElementById('feedbackBox').classList.toggle('active');
  }

  function applyFeedback() {
    const revisedText = document.getElementById('correctionInput').value;
    alert(`"${revisedText}"에 대해 다시 검색합니다.`);
    provideExplanation(revisedText);
    document.getElementById('feedbackBox').classList.remove('active');
  }

  function resetAll() {
    location.reload();
  }
</script>

</body>
</html>
