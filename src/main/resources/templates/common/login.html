<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Game Cafe - Role Selection</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #111;
    }

    .header p {
      color: #666;
      font-size: 1.1rem;
    }

    .container {
      display: flex;
      gap: 25px;
      max-width: 900px;
      width: 90%;
    }

    .card {
      flex: 1;
      background: white;
      border-radius: 20px;
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      background-color: #007bff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      color: white;
    }

    .card h2 {
      font-size: 1.5rem;
      margin: 15px 0 10px 0;
      color: #333;
    }

    .card p {
      color: #888;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* 하단 물음표 버튼 */
    .help-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Board Game Cafe</h1>
  <p>시작하려면 역할을 선택하세요</p>
</div>

<div class="container">
  <a href="/kiosk/login" class="card">
    <div class="icon-wrapper">
      <i data-lucide="gamepad-2" style="width: 40px; height: 40px;"></i>
    </div>
    <h2>고객 키오스크</h2>
    <p>테이블에서 주문하고<br>게임을 선택하세요</p>
  </a>

  <a href="/admin/login" class="card">
    <div class="icon-wrapper">
      <i data-lucide="users" style="width: 40px; height: 40px;"></i>
    </div>
    <h2>직원/관리자</h2>
    <p>테이블 상태 및<br>매장 관리</p>
  </a>
</div>

<div class="help-btn">?</div>

<script>
  // 아이콘 렌더링 스크립트
  lucide.createIcons();
</script>
</body>
</html>
