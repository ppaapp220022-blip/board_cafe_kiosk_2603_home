<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2차 인증 - 이메일 확인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5; /* 배경색 추가 */
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        input.error {
            border-color: #dc3545;
        }

        .field-error {
            font-size: 12px;
            color: #dc3545;
            margin-top: 4px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            text-align: center;
            display: none; /* 기본적으로 숨김 */
        }

        .info-box {
            background: #d1ecf1;
            color: #0c5460;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #bee5eb;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="auth-container">
    <h2>🔐 2차 인증</h2>
    <p class="subtitle">등록된 이메일 주소를 입력해주세요</p>

    <div class="info-box">
        📧 회원가입 시 등록한 이메일 주소를 정확히 입력해주세요.
    </div>

    <div id="globalError" class="error-message">
        이메일 인증에 실패했습니다. 다시 시도해주세요.
    </div>

    <form id="emailForm" action="/login/verifyEmail" method="post">
        <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required autofocus>
            <div class="field-error" id="emailError"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">확인</button>
        <button type="button" class="btn btn-secondary" id="cancelBtn">취소</button>
    </form>
</div>

<script>
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const emailForm = document.getElementById('emailForm');
    const globalError = document.getElementById('globalError');

    // 페이지 로드 시 정보 출력
    window.addEventListener('load', function () {
        // console.log('=== 2차 인증 페이지(HTML 버전) 로드 완료 ===');  -> 디버깅용

        // URL 파라미터로 에러 감지
        // (예: ?error=email)을 분석하기 위한 객체 생성
        const params = new URLSearchParams(window.location.search);

        // 주소창에 error=email이라는 값이 있다면 (서버에서 인증 실패로 리다이렉트 시킨 경우)
        if (params.get('error') === 'email') {
            globalError.textContent = '등록된 이메일 주소와 일치하지 않습니다. 다시 확인해 주세요.';
            globalError.style.display = 'block';  // 숨김되어있던 에러 박스 띄움
            emailInput.classList.add('error');  // 입력창 테두리를 빨간색으로 변경
            emailInput.focus();  // 바로 입력할 수 있게 커서 배치
        }
    });

    // 이메일 유효성 검사 (입력란에서 포커스가 빠질 때)
    emailInput.addEventListener('blur', function () {
        validateEmail();
    });

    function validateEmail() {
        const value = emailInput.value.trim();  // 앞뒤 공백 제거
        const emailPattern = /^[A-Za-z0-9+_.-]+@(.+)$/;  // 이메일 형식 체크 정규표현식
        const errorDiv = document.getElementById('emailError');

        // 경우 1: 아무것도 입력하지 않았을 때
        if (value.length === 0) {
            emailInput.classList.add('error');
            errorDiv.textContent = '이메일을 입력해주세요.';
            errorDiv.style.display = 'block';
            return false;
        }
        // 경우 2: 이메일 형식이 아닐 때
        else if (!emailPattern.test(value)) {
            emailInput.classList.add('error');
            errorDiv.textContent = '올바른 이메일 형식이 아닙니다.';
            errorDiv.style.display = 'block';
            return false;
        }
        // 경우 3: 정상 입력 시
        else {
            emailInput.classList.remove('error');  // 빨간 테두리 제거
            errorDiv.style.display = 'none';  // 에러 메시지 숨김
            return true;
        }
    }

    // 사용자가 '확인' 버튼을 누르거나 Enter를 쳤을 때
    emailForm.addEventListener('submit', function (e) {
        // 유효성 검사를 통과하지 못하였을 때,
        if (!validateEmail()) {
            e.preventDefault();  // 서버로 폼 데이터가 전송 되는 것을 막음
            emailInput.focus();
            return false;
        }

        // 중복 클릭 방지
        // 서버 응답이 오기 전에 사용자가 버튼을 여러 번 누르는 것을 막기 위해 비활성화
        submitBtn.disabled = true;
        submitBtn.textContent = '확인 중...';

        console.log('폼 제출 진행: ', emailInput.value);
        // 이후 HTML에 정의된 <form action="/login/verifyEmail" method="post"> 경로로 데이터 전송
    });

    // 취소 버튼 (관리자 로그인 페이지로 이동)
    cancelBtn.addEventListener('click', function () {
        // 사용자에게 한 번 더 의사를 물어보는 팝업창
        if (confirm('로그인을 취소하시겠습니까?')) {
            // 확인을 누르면 지정된 경로(로그인 페이지)로 이동
            window.location.href = '/admin/login';
        }
    });
</script>
</body>
</html>
