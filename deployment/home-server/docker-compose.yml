services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: boardwave-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MARIADB_URL: ${MARIADB_URL}
      MARIADB_USERNAME: ${MARIADB_USERNAME}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      PGVECTOR_URL: ${PGVECTOR_URL}
      PGVECTOR_USERNAME: ${PGVECTOR_USERNAME}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
      SPRING_SERVLET_MULTIPART_LOCATION: ${SPRING_SERVLET_MULTIPART_LOCATION}
      MY_UPLOAD_PATH: ${MY_UPLOAD_PATH}
      SPRING_BATCH_JDBC_INITIALIZE_SCHEMA: ${SPRING_BATCH_JDBC_INITIALIZE_SCHEMA}
      APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS: ${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS}
      TOSS_PAYMENTS_SECRET_KEY: ${TOSS_PAYMENTS_SECRET_KEY}
      TOSS_PAYMENTS_CLIENT_KEY: ${TOSS_PAYMENTS_CLIENT_KEY}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      MYAPP_MAIL_FROM: ${MYAPP_MAIL_FROM}
      MYAPP_MAIL_FROM_NAME: ${MYAPP_MAIL_FROM_NAME}
      MAIL_TEST_TO: ${MAIL_TEST_TO}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORTFOLIO_SUPER_KEY_ID: ${PORTFOLIO_SUPER_KEY_ID}
      PORTFOLIO_SUPER_KEY_OTP: ${PORTFOLIO_SUPER_KEY_OTP}
      PORTFOLIO_SUPER_KEY_TEMP_PASSWD: ${PORTFOLIO_SUPER_KEY_TEMP_PASSWD}
      TZ: ${TZ}
    ports:
      - "${APP_HTTP_PORT:-8085}:8080"
    volumes:
      - ${APP_UPLOAD_DATA_DIR}:/data/upload

  mariadb:
    image: mariadb:11.4
    container_name: boardwave-mariadb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${MARIADB_DATA_DIR}:/var/lib/mysql
      - ../../src/main/resources/sql/MariaDB:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: boardwave-pgvector
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${PGVECTOR_DATA_DIR}:/var/lib/postgresql/data
      - ./pgvector-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
